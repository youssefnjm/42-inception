services:
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    ports:
      - 443:443
    networks:
      - inception-network
    env_file: 
      - .env
    # restart: unless-stopped
    depends_on: 
      - wordpress

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    ports:
      - 9000:9000
    networks:
      - inception-network
    env_file: 
      - .env
    # restart: unless-stopped
    depends_on: 
      - mariadb

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    ports:
      - 3306:3306
    networks:
      - inception-network
    env_file: 
      - .env
    # restart: unless-stopped

networks:
  inception-network:
    driver: bridge
